<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <rect width="400" height="200" fill="#0a0a0f" rx="12"/>
  <rect x="1" y="1" width="398" height="198" fill="none" stroke="#00ff41" stroke-opacity="0.2" rx="11"/>
  <!-- Chip body -->
  <rect x="165" y="40" width="70" height="70" rx="4" fill="none" stroke="#00ff41" stroke-width="2"/>
  <!-- Chip pins top -->
  <line x1="180" y1="40" x2="180" y2="28" stroke="#00ff41" stroke-width="1.5"/>
  <line x1="200" y1="40" x2="200" y2="28" stroke="#00ff41" stroke-width="1.5"/>
  <line x1="220" y1="40" x2="220" y2="28" stroke="#00ff41" stroke-width="1.5"/>
  <!-- Chip pins bottom -->
  <line x1="180" y1="110" x2="180" y2="122" stroke="#00ff41" stroke-width="1.5"/>
  <line x1="200" y1="110" x2="200" y2="122" stroke="#00ff41" stroke-width="1.5"/>
  <line x1="220" y1="110" x2="220" y2="122" stroke="#00ff41" stroke-width="1.5"/>
  <!-- Chip pins left -->
  <line x1="165" y1="55" x2="153" y2="55" stroke="#00ff41" stroke-width="1.5"/>
  <line x1="165" y1="75" x2="153" y2="75" stroke="#00ff41" stroke-width="1.5"/>
  <line x1="165" y1="95" x2="153" y2="95" stroke="#00ff41" stroke-width="1.5"/>
  <!-- Chip pins right -->
  <line x1="235" y1="55" x2="247" y2="55" stroke="#00ff41" stroke-width="1.5"/>
  <line x1="235" y1="75" x2="247" y2="75" stroke="#00ff41" stroke-width="1.5"/>
  <line x1="235" y1="95" x2="247" y2="95" stroke="#00ff41" stroke-width="1.5"/>
  <!-- Chip label -->
  <text x="200" y="80" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#00ff41" font-weight="bold">ESP32</text>
  <!-- Text -->
  <text x="200" y="148" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#00ff41" font-weight="bold" letter-spacing="2">ESP32 SECURITY</text>
  <text x="200" y="165" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#00ff41" fill-opacity="0.5">Curated Resources</text>
</svg>
